{% extends "base.html" %}

{% block title %}League Overview{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto mt-8 px-4">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Weekly Leaderboard</h1>

  {% if weeks %}
    <div class="mb-4 flex items-center gap-3">
      <label for="week-select" class="text-sm text-gray-600 font-medium">Week:</label>
      <select id="week-select"
        class="border border-gray-300 rounded px-2 py-1 text-sm"
        hx-get="/overview/table"
        hx-target="#leaderboard-table"
        hx-trigger="change"
        name="week">
        {% for w in weeks %}
          <option value="{{ w }}" {% if w == selected_week %}selected{% endif %}>Week {{ w }}</option>
        {% endfor %}
      </select>
    </div>

    <div id="leaderboard-table">
      {% include "overview/_table.html" %}
    </div>
  {% else %}
    <p class="text-gray-600">No matchup data available yet. Check back once the season starts.</p>
  {% endif %}
</div>
{% endblock %}
