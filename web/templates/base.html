<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fantasy Hockey{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="border-b px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <a href="/" class="font-semibold text-gray-800 hover:text-gray-600">Fantasy Hockey</a>
      {% if selected_league_name %}
        <span class="text-gray-400">&middot;</span>
        <span class="text-gray-500 text-sm">{{ selected_league_name }}</span>
      {% endif %}
    </div>
    <nav class="flex items-center gap-4">
      <a href="/overview" class="text-sm text-gray-600 hover:text-gray-800">Overview</a>
      <a href="/waiver" class="text-sm text-gray-600 hover:text-gray-800">Waiver</a>
      <a href="/auth/logout" class="text-sm text-gray-500 hover:text-gray-700">Logout</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
